# Sonoff MINIR4
# https://sonoff.tech/product/diy-smart-switches/minir4/
#
# Управляемые объекты (интерфейс R5):
#   - Реле с одним каналом (output_relay)
#   - Кнопка на плате      (binary_sensor_onboard_button)
#   - Светодиод на плате   (output_onboard_led)
#   - Внешний выключатель  (binary_sensor_external_switch)
# Неуправляемые объекты:
#   - нет

substitutions:
  board_name: "smr4"
  friendly_board_name: "SMR4"
  debounce_delay: 30ms

esp32:
  # На devices.esphome.io указан type arduino, но esp-idf нормально работает
  # https://devices.esphome.io/devices/Sonoff-MiniR4-Extreme
  variant: esp32
  framework:
    type: esp-idf

output:
  # Реле
  - platform: gpio
    id: output_relay
    pin:
      number: 26

  # Светодиод на плате
  - platform: gpio
    id: output_onboard_led
    pin:
      number: 19
      inverted: true

binary_sensor:
  # Кнопка на плате
  - platform: gpio
    name: "Onboard button"
    id: binary_sensor_onboard_button
    pin:
      number: 0
      inverted: true
    filters:
      - delayed_on: ${debounce_delay}

  # Внешний выключатель
  - platform: gpio
    name: "External switch"
    id: binary_sensor_external_switch
    pin:
      number: 27
      inverted: true
    filters:
      - delayed_on: ${debounce_delay}
