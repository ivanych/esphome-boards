# Датчик света (binary_sensor_lightdetector)
#
# Параметры:
#   number (опционально, int):          номер датчика света (1)
#   pin (обязательно, Pin Schema):      настройки пина (pin.number: null)
#   debounce_delay (опционально, time): дребезг (30ms)
#   exposed (опционально, boolean):     публиковать расширенную информацию? (false)

substitutions:
  number: 1
  pin:
    # null тут для того, чтобы не было варнинга про то,
    # что в exposed_binary_sensor_lightdetector
    # не определена переменная ${pin.number}
    # и при этом не задавать настоящий пин
    number: null
  debounce_delay: 30ms
  exposed: false
  exposed_binary_sensor_lightdetector:
    text_sensor:
      # Номер пина, на котором работает датчик света
      - platform: template
        name: "[ext] Light Detector ${number} Pin"
        icon: mdi:connection
        entity_category: diagnostic
        lambda: 'return {"${pin.number}"};'

binary_sensor:
  # Датчик света
  - platform: gpio
    name: "Light Detector ${number}"
    id: binary_sensor_lightdetector_${number}
    pin: ${pin}
    filters:
      - delayed_on: ${debounce_delay}

packages:
  # Публиковать расширенную информацию только по запросу
  exposed: ${ exposed_binary_sensor_lightdetector if exposed else {} }
