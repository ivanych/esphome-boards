# ESP32-C3 Luatos CORE-ESP32
# https://wiki.luatos.org/chips/esp32c3/board.html
#
# Управляемые объекты:
#   - Светодиод  (output_led)
#   - Кнопка     (binary_sensor_button)
# Неуправляемые объекты:
#   - Статусный светодиод
# + разные пины

substitutions:
  friendly_board_name: "C1"
  debounce_delay: 30ms

esphome:
  platformio_options:
    board_build.flash_mode: dio

esp32:
  variant: esp32c3
  framework:
    type: esp-idf

packages:
  # Светодиод
  output_led: !include
    file: int/output_led.yaml
    vars:
      pin:
        number: 12
        # https://github.com/esphome/issues/issues/3744
        ignore_pin_validation_error: true

  # Кнопка
  binary_sensor_button: !include
    file: int/binary_sensor_button.yaml
    vars:
      pin:
        number: 9
        inverted: true
        ignore_strapping_warning: true

  # Статусный светодиод
  status_led: !include
    file: int/status_led.yaml
    vars:
      pin:
        number: 13
        # https://github.com/esphome/issues/issues/3744
        ignore_pin_validation_error: true
