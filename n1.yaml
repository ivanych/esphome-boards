# ESP32 NodeMCU-32S
# https://www.espboards.dev/esp32/nodemcu-32s/
#
# Управляемые объекты:
#   - Светодиод  (output_led)
#   - Кнопка     (binary_sensor_button)
# Неуправляемые объекты:
#   - нет
# + разные пины

substitutions:
  friendly_board_name: "N1"
  debounce_delay: 30ms

esp32:
  variant: esp32
  framework:
    type: esp-idf

packages:
  # Светодиод
  output_led: !include
    file: int/output_led.yaml
    vars:
      pin:
        number: 2
        ignore_strapping_warning: true

  # Кнопка
  binary_sensor_button: !include
    file: int/binary_sensor_button.yaml
    vars:
      pin:
        number: 0
        inverted: true
        ignore_strapping_warning: true
