# ESP32 C3 Super Mini
# https://www.espboards.dev/esp32/esp32-c3-super-mini/
#
# Управляемые объекты:
#   - Кнопка     (binary_sensor_button)
#   - Светодиод  (output_led)
# Неуправляемые объекты:
#   - нет
# + разные пины

substitutions:
  board_name: "m1"
  friendly_board_name: "M1"
  debounce_delay: 30ms

esphome:
  platformio_options:
    board_build.flash_mode: dio

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

binary_sensor:
  # Кнопка
  - platform: gpio
    name: "Button"
    id: binary_sensor_button
    pin:
      number: 9
      inverted: true
    filters:
      - delayed_on: ${debounce_delay}

output:
  # Светодиод
  - platform: gpio
    id: output_led
    pin:
      number: 8
      inverted: true
