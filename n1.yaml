# ESP32-S NodeMCU-32S
# https://wiki.geekworm.com/NodeMCU-32S
#
# Управляемые объекты (интерфейс B1):
#   - Кнопка на плате      (binary_sensor_onboard_button)
#   - Светодиод на плате   (output_onboard_led)
# Неуправляемые объекты:
#   - нет
# + разные пины

substitutions:
  board_name: "n1"
  debounce_delay: 30ms

esp32:
  board: nodemcu-32s
  framework:
    type: esp-idf

binary_sensor:
  # Кнопка на плате
  - platform: gpio
    name: "Onboard button"
    id: binary_sensor_onboard_button
    pin:
      number: 0
      inverted: true
    filters:
      - delayed_on: ${debounce_delay}

output:
  # Светодиод на плате
  - platform: gpio
    id: output_onboard_led
    pin:
      number: 2
